<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E211B"/>
      <stop offset="100%" stop-color="#081512"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4FBF7"/>
      <stop offset="100%" stop-color="#3FE28C"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <g transform="translate(32,32)">
    <!--
      Nine curved blades radiating from center, rotated evenly around
      the circle — echoes the Mantle pinwheel mark.
    -->
    <g id="blade">
      <path d="M0,-3.2
               C 7,-6 14,-10 18.5,-17
               C 13,-11.5 6,-8.5 0,-7.5
               C -1.6,-7.2 -1.6,-3.6 0,-3.2 Z"
            fill="url(#petal)"/>
    </g>
    <use href="#blade" transform="rotate(40)"/>
    <use href="#blade" transform="rotate(80)"/>
    <use href="#blade" transform="rotate(120)"/>
    <use href="#blade" transform="rotate(160)"/>
    <use href="#blade" transform="rotate(200)"/>
    <use href="#blade" transform="rotate(240)"/>
    <use href="#blade" transform="rotate(280)"/>
    <use href="#blade" transform="rotate(320)"/>
    <circle r="2.6" fill="#F4FBF7"/>
  </g>
</svg>
